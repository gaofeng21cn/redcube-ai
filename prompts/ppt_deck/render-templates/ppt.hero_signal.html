<div data-slide-root="true" data-slide-id="{{slide_id}}" data-title="{{title}}" data-speaker-seconds="{{speaker_seconds}}" data-layout-family="{{layout_family}}" data-recipe-id="{{recipe_id}}" data-template-id="{{template_id}}" data-peak-page="{{peak_page}}" style="position:relative;width:{{canvas_width}}px;height:{{canvas_height}}px;background:{{canvas_color}};overflow:hidden;padding:44px 52px 56px;display:grid;grid-template-rows:auto 1fr auto;gap:18px;">
  <header data-qa-block="header" style="display:grid;gap:10px;">
    <div style="display:flex;gap:10px;align-items:center;">
      <span style="font-size:14px;letter-spacing:0.08em;text-transform:uppercase;font-weight:800;color:{{accent}};">{{page_goal}}</span>
      {{#if peak_page}}<span style="display:inline-flex;padding:4px 8px;border-radius:999px;background:rgba(37,99,235,0.12);color:{{accent}};font-size:11px;font-weight:800;">PEAK</span>{{/if}}
    </div>
    <h2 style="margin:0;font-size:44px;line-height:1.12;color:{{ink}};">{{title}}</h2>
    <p style="margin:0;font-size:22px;line-height:1.5;color:#334155;max-width:760px;">{{lead_text}}</p>
    <div style="font-size:13px;line-height:1.5;color:#64748B;">{{visual_manifest}}</div>
  </header>
  <section data-qa-block="hero-panel" style="display:grid;grid-template-columns:1.1fr 0.9fr;gap:18px;align-items:stretch;">
    <div style="padding:24px;border-radius:24px;background:#FFFFFF;border:1px solid #CBD5E1;display:grid;gap:12px;">
      {{#each support_cards}}<div data-primary-point="true" style="padding:14px 16px;border-radius:18px;background:rgba(37,99,235,0.08);font-size:22px;line-height:1.45;color:{{ink}};">{{text}}</div>{{/each}}
    </div>
    <div style="padding:24px;border-radius:24px;background:linear-gradient(135deg, rgba(37,99,235,0.12), #FFFFFF);border:1px solid rgba(37,99,235,0.18);display:grid;gap:12px;align-content:start;">
      <div style="font-size:14px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:{{accent}};">视觉导演稿</div>
      <div style="font-size:24px;line-height:1.45;color:{{ink}};">{{director_role}}</div>
      <div style="font-size:16px;line-height:1.6;color:#475569;">{{source_label_1}}</div>
    </div>
  </section>
  <footer data-qa-block="footer" style="display:flex;justify-content:space-between;align-items:center;font-size:14px;color:#475569;">
    <div>{{source_label_1}}</div>
    <div style="font-weight:700;">{{slide_no}} / {{total_slides}}</div>
  </footer>
</div>
