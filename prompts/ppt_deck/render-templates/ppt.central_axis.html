<div data-slide-root="true" data-slide-id="{{slide_id}}" data-title="{{title}}" data-speaker-seconds="{{speaker_seconds}}" data-layout-family="{{layout_family}}" data-recipe-id="{{recipe_id}}" data-template-id="{{template_id}}" data-peak-page="{{peak_page}}" style="position:relative;width:{{canvas_width}}px;height:{{canvas_height}}px;background:{{canvas_color}};overflow:hidden;padding:44px 52px 56px;display:grid;grid-template-rows:auto 1fr auto;gap:18px;">
  <header data-qa-block="header" style="display:grid;gap:10px;">
    <div style="font-size:14px;letter-spacing:0.08em;text-transform:uppercase;font-weight:800;color:{{accent}};">{{page_goal}}</div>
    <h2 style="margin:0;font-size:40px;line-height:1.15;color:{{ink}};">{{title}}</h2>
    <p style="margin:0;font-size:22px;line-height:1.55;color:#334155;max-width:760px;">{{lead_text}}</p>
  </header>
  <section data-qa-block="axis" style="position:relative;display:grid;grid-template-columns:repeat({{axis_count}},1fr);gap:18px;align-items:center;">
    <div style="position:absolute;left:40px;right:40px;top:50%;height:6px;border-radius:999px;background:linear-gradient(90deg, rgba(37,99,235,0.2), rgba(37,99,235,0.65));"></div>
    {{#each axis_cards}}<article data-qa-block="axis-card" data-primary-point="true" style="position:relative;display:grid;gap:10px;justify-items:center;">
      <div style="width:56px;height:56px;border-radius:999px;background:{{accent}};color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-weight:800;box-shadow:0 10px 24px rgba(37,99,235,0.25);">{{index1}}</div>
      <div style="padding:16px 16px 18px;min-height:170px;border-radius:22px;background:#FFFFFF;border:1px solid #CBD5E1;display:grid;gap:8px;">
        <div style="font-size:17px;font-weight:800;color:{{accent}};">轴线 {{index1}}</div>
        <div style="font-size:22px;line-height:1.45;color:{{ink}};">{{text}}</div>
      </div>
    </article>{{/each}}
  </section>
  <footer data-qa-block="footer" style="display:flex;justify-content:space-between;align-items:center;font-size:14px;color:#475569;">
    <div>{{source_label_1}}</div>
    <div style="font-weight:700;">{{slide_no}} / {{total_slides}}</div>
  </footer>
</div>
