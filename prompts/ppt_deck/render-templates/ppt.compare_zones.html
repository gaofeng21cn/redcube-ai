<div data-slide-root="true" data-slide-id="{{slide_id}}" data-title="{{title}}" data-speaker-seconds="{{speaker_seconds}}" data-layout-family="{{layout_family}}" data-recipe-id="{{recipe_id}}" data-template-id="{{template_id}}" data-peak-page="{{peak_page}}" style="position:relative;width:{{canvas_width}}px;height:{{canvas_height}}px;background:{{canvas_color}};overflow:hidden;padding:44px 52px 56px;display:grid;grid-template-rows:auto 1fr auto;gap:18px;">
  <header data-qa-block="header" style="display:grid;gap:10px;">
    <div style="font-size:14px;letter-spacing:0.08em;text-transform:uppercase;font-weight:800;color:{{accent}};">{{page_goal}}</div>
    <h2 style="margin:0;font-size:40px;line-height:1.15;color:{{ink}};">{{title}}</h2>
    <p style="margin:0;font-size:22px;line-height:1.55;color:#334155;max-width:760px;">{{lead_text}}</p>
  </header>
  <section data-qa-block="zones" style="display:grid;grid-template-columns:repeat(2,1fr);gap:18px;align-items:stretch;">
    {{#each zone_cards}}<article data-primary-point="true" style="padding:20px;border-radius:24px;background:#FFFFFF;border:1px solid #CBD5E1;display:grid;gap:10px;align-content:start;">
      <div style="font-size:13px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:{{accent}};">展开 {{index1}}</div>
      <div style="font-size:24px;line-height:1.45;color:{{ink}};">{{text}}</div>
    </article>{{/each}}
  </section>
  <footer data-qa-block="footer" style="display:flex;justify-content:space-between;align-items:center;font-size:14px;color:#475569;">
    <div>{{source_label_1}}</div>
    <div style="font-weight:700;">{{slide_no}} / {{total_slides}}</div>
  </footer>
</div>
