<div data-slide-root="true" data-slide-id="{{slide_id}}" data-title="{{title}}" data-speaker-seconds="{{speaker_seconds}}" data-layout-family="{{layout_family}}" data-recipe-id="{{recipe_id}}" data-template-id="{{template_id}}" data-peak-page="{{peak_page}}" style="position:relative;width:{{canvas_width}}px;height:{{canvas_height}}px;background:{{canvas_color}};overflow:hidden;padding:44px 52px 56px;display:grid;grid-template-rows:auto 1fr auto;gap:18px;">
  <header data-qa-block="header" style="display:grid;gap:10px;">
    <div style="font-size:14px;letter-spacing:0.08em;text-transform:uppercase;font-weight:800;color:{{accent}};">{{page_goal}}</div>
    <h2 style="margin:0;font-size:40px;line-height:1.15;color:{{ink}};">{{title}}</h2>
    <p style="margin:0;font-size:22px;line-height:1.55;color:#334155;">{{lead_text}}</p>
  </header>
  <section data-qa-block="cross" style="position:relative;min-height:360px;">
    <div data-qa-block="hub" style="position:absolute;left:50%;top:50%;transform:translate(-50%, -50%);width:260px;min-height:140px;border-radius:28px;background:linear-gradient(135deg, rgba(37,99,235,0.16), #FFFFFF);border:1px solid rgba(37,99,235,0.22);display:grid;place-items:center;text-align:center;padding:28px;font-size:24px;font-weight:800;color:{{ink}};">{{hub_text}}</div>
    <div data-qa-block="north" style="position:absolute;left:50%;top:0;transform:translateX(-50%);width:250px;min-height:98px;padding:16px;border-radius:22px;background:#FFFFFF;border:1px solid #CBD5E1;display:grid;place-items:center;text-align:center;font-size:22px;font-weight:700;color:{{ink}};">{{north_text}}</div>
    <div data-qa-block="east" style="position:absolute;right:0;top:50%;transform:translateY(-50%);width:250px;min-height:98px;padding:16px;border-radius:22px;background:#FFFFFF;border:1px solid #CBD5E1;display:grid;place-items:center;text-align:center;font-size:22px;font-weight:700;color:{{ink}};">{{east_text}}</div>
    <div data-qa-block="south" style="position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:250px;min-height:98px;padding:16px;border-radius:22px;background:#FFFFFF;border:1px solid #CBD5E1;display:grid;place-items:center;text-align:center;font-size:22px;font-weight:700;color:{{ink}};">{{south_text}}</div>
    <div data-qa-block="west" style="position:absolute;left:0;top:50%;transform:translateY(-50%);width:250px;min-height:98px;padding:16px;border-radius:22px;background:#FFFFFF;border:1px solid #CBD5E1;display:grid;place-items:center;text-align:center;font-size:22px;font-weight:700;color:{{ink}};">{{west_text}}</div>
  </section>
  <footer data-qa-block="footer" style="display:flex;justify-content:space-between;align-items:center;font-size:14px;color:#475569;">
    <div>{{source_label_1}}</div>
    <div style="font-weight:700;">{{slide_no}} / {{total_slides}}</div>
  </footer>
</div>
