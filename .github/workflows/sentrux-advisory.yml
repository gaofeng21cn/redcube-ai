name: Sentrux Advisory

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  structural-gate:
    name: Structural quality advisory
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Sentrux
        run: curl -fsSL https://sentrux.dev/install.sh | sh

      - name: Run structural gate
        shell: bash
        run: |
          set -euo pipefail
          sentrux --version
          sentrux analytics off || true

          if [ -f .sentrux/baseline.json ]; then
            if ! sentrux gate .; then
              echo "::warning::Sentrux reported structural regression. Treat this as advisory: review semantic intent and structural side effects; block only large unexplained drops or repo-approved rule violations."
            fi
          else
            echo "::notice::No .sentrux/baseline.json found; saving advisory baseline for this CI run."
            sentrux gate --save .
          fi

          if [ -f .sentrux/rules.toml ]; then
            if ! sentrux check .; then
              echo "::warning::Sentrux rules reported violations. This advisory job does not block by itself; apply the repo's merge policy and product semantics first."
            fi
          else
            echo "::notice::No .sentrux/rules.toml found; skipping rules check."
          fi
