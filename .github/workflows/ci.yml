name: CI

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
  schedule:
    - cron: '17 19 * * *'

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout OPL Framework
        run: |
          git clone --depth=1 --filter=blob:none https://github.com/gaofeng21cn/one-person-lab.git ../one-person-lab

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Build OPL Framework
        run: |
          npm ci --prefix ../one-person-lab --ignore-scripts
          npm run --prefix ../one-person-lab build
          echo "OPL_BIN=$GITHUB_WORKSPACE/../one-person-lab/bin/opl" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.9.5'

      - name: Install Python test dependencies
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/redcube-ai-quality-venv
        run: |
          uv sync --locked --no-dev --extra native --no-install-project --python 3.12
          echo "$UV_PROJECT_ENVIRONMENT/bin" >> "$GITHUB_PATH"
          echo "REDCUBE_PYTHON_COMMAND=$UV_PROJECT_ENVIRONMENT/bin/python" >> "$GITHUB_ENV"

      - name: Install Node dependencies
        run: npm ci

      - name: Link OPL Framework
        run: |
          "$OPL_BIN" packages link-framework --agent-root "$GITHUB_WORKSPACE" --json

      - name: Run build and typecheck
        run: npm run typecheck

      - name: Run fast tests
        run: node scripts/run-test-group.ts fast

      - name: Run remaining meta tests
        run: node scripts/run-test-group.ts meta:ci

  native-ppt-proof:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'native-ppt-proof'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Checkout and build OPL Framework
        run: |
          git clone --depth=1 --filter=blob:none https://github.com/gaofeng21cn/one-person-lab.git ../one-person-lab
          npm ci --prefix ../one-person-lab --ignore-scripts
          npm run --prefix ../one-person-lab build
          echo "OPL_BIN=$GITHUB_WORKSPACE/../one-person-lab/bin/opl" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.9.5'

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: native-ppt-proof-uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: native-ppt-proof-playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Python native helper dependencies
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/redcube-ai-native-ppt-proof-venv
        run: |
          uv sync --locked --no-dev --extra native --no-install-project --python 3.12
          echo "$UV_PROJECT_ENVIRONMENT/bin" >> "$GITHUB_PATH"
          echo "REDCUBE_PYTHON_COMMAND=$UV_PROJECT_ENVIRONMENT/bin/python" >> "$GITHUB_ENV"

      - name: Install Node dependencies
        run: npm ci

      - name: Link OPL Framework
        run: |
          "$OPL_BIN" packages link-framework --agent-root "$GITHUB_WORKSPACE" --json

      - name: Run native PPT true proof
        run: tools/native-ppt-proof/run.sh --output-dir artifacts/native-ppt-proof

      - name: Upload native PPT proof artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-ppt-proof
          path: |
            artifacts/native-ppt-proof
            artifacts/native-ppt-proof/artifact-index.json

  image-ppt-proof:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'image-ppt-proof'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Checkout and build OPL Framework
        run: |
          git clone --depth=1 --filter=blob:none https://github.com/gaofeng21cn/one-person-lab.git ../one-person-lab
          npm ci --prefix ../one-person-lab --ignore-scripts
          npm run --prefix ../one-person-lab build
          echo "OPL_BIN=$GITHUB_WORKSPACE/../one-person-lab/bin/opl" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.9.5'

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: image-ppt-proof-uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: image-ppt-proof-playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Python proof dependencies
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/redcube-ai-image-ppt-proof-venv
        run: |
          uv sync --locked --no-dev --extra native --no-install-project --python 3.12
          echo "$UV_PROJECT_ENVIRONMENT/bin" >> "$GITHUB_PATH"
          echo "REDCUBE_PYTHON_COMMAND=$UV_PROJECT_ENVIRONMENT/bin/python" >> "$GITHUB_ENV"

      - name: Install Node dependencies
        run: npm ci

      - name: Link OPL Framework
        run: |
          "$OPL_BIN" packages link-framework --agent-root "$GITHUB_WORKSPACE" --json

      - name: Run image PPT proof
        run: tools/image-ppt-proof/run.sh --output-dir artifacts/image-ppt-proof --mock-image-generation

      - name: Upload image PPT proof artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: image-ppt-proof
          path: |
            artifacts/image-ppt-proof
            artifacts/image-ppt-proof/artifact-index.json
