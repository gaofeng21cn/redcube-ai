name: CI

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
  schedule:
    - cron: '17 19 * * *'

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r .github/requirements/ci-python.txt

      - name: Install Playwright browser
        run: python3 -m playwright install --with-deps chromium

      - name: Install Node dependencies
        run: npm ci

      - name: Run build and typecheck
        run: npm run typecheck

      - name: Run fast tests
        run: node --experimental-strip-types scripts/run-test-group.ts fast

      - name: Run family tests
        run: node --experimental-strip-types scripts/run-test-group.ts family

      - name: Run meta tests
        run: node --experimental-strip-types scripts/run-test-group.ts meta

  native-ppt-proof:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'native-ppt-proof'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: native-ppt-proof-pip-${{ runner.os }}-${{ hashFiles('.github/requirements/ci-python.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: native-ppt-proof-playwright-${{ runner.os }}-${{ hashFiles('.github/requirements/ci-python.txt') }}

      - name: Install Python native helper dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r .github/requirements/ci-python.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run native PPT true proof
        run: tools/native-ppt-proof/run.sh --output-dir artifacts/native-ppt-proof

      - name: Upload native PPT proof artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: native-ppt-proof
          path: |
            artifacts/native-ppt-proof
            artifacts/native-ppt-proof/artifact-index.json
