name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install native proof system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils fonts-noto-cjk

      - name: Install Python test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r .github/requirements/ci-python.txt

      - name: Install Playwright browser
        run: python3 -m playwright install --with-deps chromium

      - name: Install Node dependencies
        run: npm ci

      - name: Run build and typecheck
        run: npm run typecheck

      - name: Run fast tests
        run: node --experimental-strip-types scripts/run-test-group.ts fast

      - name: Run family tests
        run: node --experimental-strip-types scripts/run-test-group.ts family

      - name: Run meta tests
        run: node --experimental-strip-types scripts/run-test-group.ts meta
