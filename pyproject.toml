[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "redcube-ai"
version = "0.1.0"
description = "RedCube AI Python native helper package for PPT and document automation lanes."
requires-python = ">=3.11"

[project.optional-dependencies]
ppt = ["Pillow", "python-pptx"]
review = ["playwright"]
native = ["Pillow", "python-pptx", "playwright"]

[tool.setuptools.packages.find]
where = ["python"]
