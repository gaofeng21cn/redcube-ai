<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RedCube AI Workbench</title>
  <style>
    :root {
      --ui-font: "Avenir Next", "SF Pro Text", "PingFang SC", "Noto Sans SC", sans-serif;
      --display-font: "Iowan Old Style", "Palatino Linotype", "Songti SC", "STSong", serif;
      --bg: #edf1f6;
      --bg-deep: #dfe7f1;
      --panel: rgba(244, 247, 251, 0.84);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --panel-wash: rgba(255, 255, 255, 0.76);
      --line: rgba(15, 23, 42, 0.08);
      --line-strong: rgba(15, 23, 42, 0.16);
      --ink: #0f172a;
      --muted: #5b6779;
      --brand: #d03b4c;
      --brand-soft: rgba(208, 59, 76, 0.10);
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.12);
      --running: #2563eb;
      --running-soft: rgba(37, 99, 235, 0.12);
      --blocked: #b42318;
      --pending: #956317;
      --done: #0f766e;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
      --shadow-strong: 0 26px 80px rgba(15, 23, 42, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.10), transparent 26%),
        radial-gradient(circle at 100% 0%, rgba(208, 59, 76, 0.10), transparent 24%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 44%, var(--bg-deep) 100%);
      font-family: var(--ui-font);
      letter-spacing: 0.01em;
    }

    button,
    a,
    input,
    select {
      font: inherit;
    }

    button,
    a.button-link {
      border: none;
      text-decoration: none;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    button:hover,
    a.button-link:hover {
      transform: translateY(-1px);
    }

    button:focus-visible,
    a.button-link:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 1px rgba(208, 59, 76, 0.28),
        0 0 0 4px rgba(208, 59, 76, 0.14);
    }

    .shell {
      max-width: 1560px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      isolation: isolate;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      z-index: -1;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(10px);
      opacity: 0.92;
    }

    .shell::before {
      width: 320px;
      height: 320px;
      top: -60px;
      left: -120px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.16), transparent 70%);
    }

    .shell::after {
      width: 340px;
      height: 340px;
      top: 28px;
      right: -120px;
      background: radial-gradient(circle, rgba(208, 59, 76, 0.14), transparent 72%);
    }

    .panel {
      background: linear-gradient(180deg, rgba(250, 252, 255, 0.84), rgba(244, 247, 251, 0.82));
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-strong);
      backdrop-filter: blur(20px) saturate(120%);
    }

    .app-header {
      position: relative;
      overflow: hidden;
      padding: 24px 24px 20px;
      margin-bottom: 18px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(243,247,252,0.94)),
        radial-gradient(circle at top right, rgba(208, 59, 76, 0.12), transparent 28%),
        radial-gradient(circle at bottom left, rgba(37, 99, 235, 0.12), transparent 24%);
    }

    .app-header::before,
    .app-header::after {
      content: "";
      position: absolute;
      inset: auto;
      pointer-events: none;
    }

    .app-header::before {
      top: 0;
      right: 0;
      width: 46%;
      height: 100%;
      background:
        linear-gradient(120deg, transparent, rgba(255,255,255,0.42)),
        repeating-linear-gradient(135deg, rgba(15, 23, 42, 0.03) 0 1px, transparent 1px 14px);
      opacity: 0.85;
    }

    .app-header::after {
      left: 24px;
      right: 24px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(37, 99, 235, 0.00), rgba(37, 99, 235, 0.24), rgba(208, 59, 76, 0.24), rgba(208, 59, 76, 0.00));
    }

    .app-topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) auto auto;
      gap: 18px;
      align-items: center;
    }

    .brand-kicker {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .brand-title {
      margin-top: 6px;
      font-family: var(--display-font);
      font-size: clamp(30px, 3.6vw, 40px);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .brand-note {
      margin-top: 10px;
      max-width: 58ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.82;
    }

    .tabs-nav {
      display: inline-flex;
      justify-self: center;
      gap: 6px;
      padding: 8px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        0 14px 28px rgba(15, 23, 42, 0.06);
      backdrop-filter: blur(20px);
    }

    .tab-button {
      padding: 11px 17px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
      min-height: 44px;
      letter-spacing: 0.01em;
    }

    .tab-button.active {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(28, 52, 74, 0.92));
      color: #f8fafc;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.12),
        0 10px 22px rgba(15, 23, 42, 0.14);
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .button-link,
    .btn-secondary,
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 11px 18px;
      max-width: 100%;
      white-space: nowrap;
      min-height: 44px;
      font-weight: 650;
    }

    .button-link,
    .btn-secondary {
      background: rgba(255, 255, 255, 0.70);
      color: var(--ink);
      border: 1px solid rgba(15, 23, 42, 0.08);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.04);
    }

    .btn-primary {
      background: linear-gradient(135deg, #101828, #17334d 56%, #0f766e);
      color: #f8fafc;
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.18);
    }

    .btn-danger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 11px 16px;
      max-width: 100%;
      white-space: nowrap;
      background: rgba(180, 35, 24, 0.08);
      color: #9f1d15;
      border: 1px solid rgba(180, 35, 24, 0.14);
    }

    .workspace-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
    }

    .workspace-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .workspace-badge {
      display: inline-grid;
      align-items: start;
      gap: 10px;
      padding: 12px 15px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(15, 23, 42, 0.08);
      max-width: 100%;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.88);
    }

    .workspace-badge-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .workspace-badge-value {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 520px;
    }

    .field select,
    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.78);
      padding: 13px 14px;
      color: var(--ink);
      outline: none;
    }

    .field select:focus,
    .field input:focus {
      border-color: rgba(208, 59, 76, 0.35);
      box-shadow: 0 0 0 4px rgba(208, 59, 76, 0.08);
    }

    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .metric-pill {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 14px 16px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.92);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.88), rgba(248,250,252,0.78));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        0 10px 22px rgba(15, 23, 42, 0.04);
    }

    .metric-pill strong {
      font-size: 20px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .metric-pill span {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .main-panel {
      min-height: calc(100vh - 210px);
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.68), rgba(246,249,252,0.72));
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
      animation: panelFadeIn 260ms ease both;
    }

    .surface {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(247,250,252,0.92));
      box-shadow:
        0 12px 30px rgba(20, 33, 48, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.86);
    }

    .workbench-layout {
      display: grid;
      grid-template-columns: 232px minmax(0, 1fr) 300px;
      gap: 18px;
      min-height: calc(100vh - 280px);
    }

    .workbench-layout > * {
      min-width: 0;
    }

    .rail {
      padding: 18px;
      display: grid;
      gap: 16px;
      align-content: start;
      min-width: 0;
      overflow: hidden;
    }

    .rail-section + .rail-section {
      margin-top: 2px;
    }

    .rail-project-name {
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .rail-project-switch {
      display: flex;
      margin-top: 10px;
      width: 100%;
      justify-content: center;
    }

    .section-title {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .section-copy {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .list-stack,
    .stage-stack,
    .chip-row,
    .run-list {
      display: grid;
      gap: 10px;
    }

    .list-button,
    .stage-button,
    .preview-chip,
    .project-row,
    .run-row {
      width: 100%;
      text-align: left;
      border-radius: 18px;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--line);
      color: inherit;
    }

    .list-button.active,
    .stage-button.active,
    .preview-chip.active,
    .project-row.active {
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.96), rgba(255, 255, 255, 0.84));
      border-color: rgba(37, 99, 235, 0.18);
    }

    .list-label,
    .project-name {
      font-size: 15px;
      font-weight: 650;
      line-height: 1.35;
    }

    .list-meta,
    .stage-meta,
    .project-meta,
    .run-meta,
    .field-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-pill.done {
      color: var(--done);
      background: rgba(15, 118, 110, 0.12);
    }

    .status-pill.pending {
      color: var(--pending);
      background: rgba(161, 98, 7, 0.12);
    }

    .status-pill.running {
      color: var(--running);
      background: var(--running-soft);
    }

    .status-pill.failed {
      color: var(--blocked);
      background: rgba(180, 35, 24, 0.12);
    }

    .status-pill.blocked {
      color: var(--blocked);
      background: rgba(154, 52, 18, 0.12);
    }

    .canvas {
      padding: 22px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .canvas-header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
    }

    .canvas-context-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .canvas-kicker {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .context-link {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(15, 23, 42, 0.05);
      color: var(--ink);
      font-size: 12px;
      font-weight: 600;
    }

    .canvas-title {
      margin: 10px 0 10px;
      font-family: var(--display-font);
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .canvas-subtitle {
      margin: 0;
      max-width: 68ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .inline-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 12px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }

    .stat-chip strong {
      color: var(--ink);
      font-size: 13px;
    }

    .preview-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .preview-chip {
      width: auto;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
    }

    .preview-canvas {
      min-height: 780px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.05), transparent 24%),
        rgba(255, 255, 255, 0.88);
    }

    .preview-canvas.phone-canvas {
      max-width: 700px;
      min-height: 560px;
      height: min(720px, calc(100vh - 380px));
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.05), transparent 32%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 247, 251, 0.96));
    }

    .preview-canvas.phone-canvas.image-preview {
      min-height: 420px;
      height: min(560px, calc(100vh - 500px));
    }

    .preview-empty {
      min-height: 780px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      line-height: 1.8;
      padding: 40px;
    }

    .doc-viewer {
      height: 780px;
      overflow: auto;
      padding: 24px 26px;
      white-space: pre-wrap;
      line-height: 1.74;
      font-size: 14px;
    }

    .html-viewer {
      border: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    .image-stage {
      height: 100%;
      overflow: hidden;
      padding: 12px;
      display: grid;
      place-items: center;
      background: #fff;
      min-height: 0;
    }

    .slide-frame {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #f8fafc, #edf2f7);
      display: grid;
      place-items: center;
      padding: 10px;
      min-height: 0;
    }

    .projects-home,
    .project-home-canvas {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .project-home-layout {
      grid-template-columns: 232px minmax(0, 1fr) 360px;
    }

    .project-hero-shell {
      padding: 24px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(208, 59, 76, 0.10), transparent 30%),
        radial-gradient(circle at bottom left, rgba(37, 99, 235, 0.10), transparent 26%),
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(243,247,252,0.95));
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .project-hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.85fr);
      gap: 18px;
      align-items: stretch;
    }

    .project-hero-body,
    .project-hero-side {
      min-width: 0;
    }

    .project-hero-title {
      margin: 12px 0 10px;
      font-family: var(--display-font);
      font-size: clamp(34px, 4vw, 54px);
      line-height: 0.92;
      letter-spacing: -0.05em;
    }

    .project-hero-copy {
      margin: 0;
      max-width: 58ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.78;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .workspace-overview-panel {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(246,249,252,0.94));
    }

    .onboarding-shell {
      padding: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.10), transparent 30%),
        radial-gradient(circle at bottom left, rgba(208, 59, 76, 0.08), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,0.99), rgba(244,248,252,0.95));
      border: 1px solid rgba(15, 23, 42, 0.08);
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .onboarding-shell.compact {
      padding: 20px;
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(245,249,250,0.94));
    }

    .onboarding-header {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .onboarding-title {
      margin: 0;
      font-family: var(--display-font);
      font-size: clamp(28px, 3.6vw, 44px);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .onboarding-shell.compact .onboarding-title {
      font-size: clamp(24px, 3vw, 34px);
    }

    .onboarding-copy {
      margin: 0;
      max-width: 70ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .onboarding-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .onboarding-step-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(247,250,252,0.92));
      display: grid;
      gap: 12px;
      min-width: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.88);
    }

    .onboarding-step-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.06);
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .onboarding-step-title {
      font-size: 16px;
      font-weight: 720;
      line-height: 1.35;
      letter-spacing: -0.03em;
    }

    .onboarding-step-copy {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.72;
      overflow-wrap: anywhere;
    }

    .onboarding-step-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .onboarding-callout {
      padding: 16px 18px;
      border-radius: 20px;
      border: 1px solid rgba(37, 99, 235, 0.12);
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.92), rgba(255, 255, 255, 0.88));
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.05);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.75;
    }

    .overview-card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .overview-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.92));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.88);
      min-width: 0;
    }

    .overview-card-kicker {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .overview-card-metric {
      margin-top: 12px;
      font-size: clamp(28px, 4vw, 38px);
      font-weight: 760;
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .overview-card-title {
      margin-top: 12px;
      font-size: 15px;
      font-weight: 680;
      line-height: 1.45;
    }

    .overview-card-copy {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .workflow-status-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .workflow-status-card.running {
      border-color: rgba(37, 99, 235, 0.16);
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.08), transparent 30%),
        rgba(255,255,255,0.94);
    }

    .workflow-status-card.failed {
      border-color: rgba(180, 35, 24, 0.16);
      background:
        radial-gradient(circle at top right, rgba(180, 35, 24, 0.08), transparent 30%),
        rgba(255,255,255,0.94);
    }

    .workflow-status-card.done {
      border-color: rgba(15, 118, 110, 0.16);
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 30%),
        rgba(255,255,255,0.94);
    }

    .workflow-status-card.compact {
      height: 100%;
      align-content: start;
    }

    .workflow-status-top,
    .timeline-card-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .workflow-status-title {
      margin-top: 6px;
      font-family: var(--display-font);
      font-size: 22px;
      font-weight: 720;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .workflow-progress-row {
      display: grid;
      gap: 10px;
    }

    .workflow-progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .workflow-progress-meta strong {
      color: var(--ink);
      font-size: 13px;
      letter-spacing: 0;
    }

    .workflow-progress-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.06);
      overflow: hidden;
      position: relative;
    }

    .workflow-progress-track span {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #2563eb, #d03b4c);
    }

    .workflow-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .workflow-detail {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.03);
      border: 1px solid rgba(15, 23, 42, 0.06);
      min-width: 0;
    }

    .workflow-detail span,
    .workflow-time,
    .timeline-time {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .workflow-detail strong {
      display: block;
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .step-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .step-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.86);
      color: var(--muted);
    }

    .step-chip.done {
      color: var(--done);
      border-color: rgba(15, 118, 110, 0.14);
      background: rgba(15, 118, 110, 0.08);
    }

    .step-chip.running {
      color: var(--running);
      border-color: rgba(37, 99, 235, 0.14);
      background: rgba(37, 99, 235, 0.08);
    }

    .step-chip.failed {
      color: var(--blocked);
      border-color: rgba(180, 35, 24, 0.14);
      background: rgba(180, 35, 24, 0.08);
    }

    .timeline-stack {
      display: grid;
      gap: 12px;
    }

    .timeline-card {
      padding: 16px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.92));
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .timeline-card.running {
      border-color: rgba(37, 99, 235, 0.14);
    }

    .timeline-card.failed {
      border-color: rgba(180, 35, 24, 0.14);
    }

    .timeline-card.done {
      border-color: rgba(15, 118, 110, 0.14);
    }

    .timeline-card-title,
    .directory-card-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .project-home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 18px;
    }

    .project-directory-panel {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(244,248,252,0.94));
    }

    .project-directory-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .directory-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(247,250,252,0.92));
      display: grid;
      gap: 14px;
      min-width: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.88);
    }

    .directory-card.active {
      border-color: rgba(37, 99, 235, 0.16);
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.06), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.99), rgba(244,248,252,0.94));
    }

    .directory-card-copy {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .directory-card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .slide-image-box {
      width: min(100%, calc(100% * 896 / 1195));
      height: 100%;
      max-width: 100%;
      aspect-ratio: 896 / 1195;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .slide-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center top;
      min-height: 0;
    }

    .projects-layout,
    .runs-layout,
    .models-layout {
      display: grid;
      gap: 18px;
    }

    .projects-layout {
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
    }

    .project-catalog-panel {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(247,250,251,0.92));
    }

    .focus-panel {
      background:
        radial-gradient(circle at top right, rgba(18, 115, 109, 0.08), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(244,248,249,0.94));
      border: 1px solid rgba(18, 115, 109, 0.10);
    }

    .focus-heading {
      font-family: var(--display-font);
      font-size: 28px;
      font-weight: 750;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .focus-stat-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .focus-actions {
      display: grid;
      gap: 10px;
    }

    .runs-layout {
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.8fr);
    }

    .models-layout {
      grid-template-columns: minmax(280px, 0.72fr) minmax(0, 1fr);
    }

    .content-column {
      padding: 20px;
      display: grid;
      gap: 16px;
      align-content: start;
      min-width: 0;
    }

    .system-card {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(244, 248, 252, 0.9));
      border: 1px solid rgba(37, 99, 235, 0.10);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .system-card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, rgba(208, 59, 76, 0.72), rgba(37, 99, 235, 0.42));
      opacity: 0.9;
    }

    .system-card-primary {
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.10), transparent 30%),
        linear-gradient(180deg, rgba(248, 250, 252, 0.96), rgba(244, 247, 251, 0.92));
    }

    .category-pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .category-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      color: var(--muted);
      font-size: 12px;
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .category-pill strong {
      color: var(--ink);
      font-size: 12px;
    }

    .note-teaser {
      background: rgba(255, 255, 255, 0.66);
    }

    .status-callout {
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.92), rgba(255, 255, 255, 0.84));
      border-color: rgba(37, 99, 235, 0.12);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.05);
    }

    .project-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      background:
        radial-gradient(circle at top right, rgba(18, 115, 109, 0.06), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(247,250,251,0.88));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.88),
        0 12px 28px rgba(20,33,48,0.04);
    }

    .project-row-actions {
      display: grid;
      gap: 10px;
      justify-items: end;
      align-content: center;
    }

    .project-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      color: var(--muted);
      font-size: 12px;
    }

    .model-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .model-chip {
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      font-size: 13px;
    }

    .field-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .matrix-grid {
      display: grid;
      gap: 10px;
    }

    .matrix-row {
      display: grid;
      grid-template-columns: minmax(180px, 0.65fr) minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.72);
    }

    .matrix-title {
      font-size: 14px;
      font-weight: 650;
    }

    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line-strong);
      border-radius: 20px;
      line-height: 1.7;
    }

    .run-row strong {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .instruction-panel {
      padding: 18px;
      display: grid;
      gap: 14px;
      align-content: start;
      min-width: 0;
    }

    .instruction-textarea {
      width: 100%;
      min-height: 140px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.84);
      padding: 14px;
      resize: vertical;
      font: inherit;
      color: var(--ink);
      outline: none;
      line-height: 1.65;
    }

    .instruction-textarea:focus {
      border-color: rgba(208, 59, 76, 0.35);
      box-shadow: 0 0 0 4px rgba(208, 59, 76, 0.08);
    }

    .instruction-target {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .input-editor-textarea {
      width: 100%;
      min-height: 620px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 18px;
      resize: vertical;
      font: inherit;
      color: var(--ink);
      outline: none;
      line-height: 1.72;
    }

    .input-editor-textarea:focus {
      border-color: rgba(37, 99, 235, 0.35);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(8px);
      z-index: 30;
      padding: 24px;
    }

    .modal-backdrop.open {
      display: grid;
    }

    .modal-card {
      width: min(860px, 100%);
      border-radius: 28px;
      border: 1px solid var(--line);
      background: rgba(248, 250, 252, 0.98);
      box-shadow: 0 32px 90px rgba(15, 23, 42, 0.18);
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .modal-title {
      margin: 0;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .modal-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      max-width: 56ch;
    }

    .modal-grid {
      display: grid;
      gap: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: 14px;
    }

    .toggle-row input {
      width: 18px;
      height: 18px;
    }

    .save-bar {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, transparent, rgba(244, 247, 251, 0.94) 40%);
    }

    @keyframes panelFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1200px) {
      .projects-layout,
      .runs-layout,
      .models-layout,
      .project-home-grid,
      .project-hero-grid,
      .onboarding-grid,
      .overview-card-grid,
      .project-directory-grid {
        grid-template-columns: 1fr;
      }
    }

        @media (max-width: 1040px) {
          .app-topbar,
          .workspace-row,
          .workbench-layout,
          .project-home-layout {
            grid-template-columns: 1fr;
      }

      .tabs-nav {
        justify-self: start;
      }
    }

    @media (max-width: 760px) {
      .shell {
        padding: 16px;
      }

      .preview-canvas,
      .preview-empty,
      .doc-viewer,
      .html-viewer,
      .image-stage {
        min-height: 520px;
        height: 520px;
      }

      .preview-canvas.phone-canvas {
        min-height: 560px;
        height: 560px;
      }

      .matrix-row {
        grid-template-columns: 1fr;
      }

      .workflow-detail-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="app-header panel">
      <div class="app-topbar">
            <div class="brand">
              <div class="brand-kicker">RedCube AI Workbench</div>
              <div class="brand-title">RedCube AI Workbench</div>
              <div class="brand-note">面向高质量图文笔记生产的智能工作台。在一个界面里管理输入材料、查看笔记产物，并把首轮生成、局部重跑和发布闭环稳定落地，尤其适合小红书这类图文平台。</div>
            </div>
        <nav class="tabs-nav" id="tabsNav"></nav>
        <div class="header-actions">
          <button class="btn-primary" id="openCreateTaskBtn">新建任务</button>
          <a class="button-link btn-secondary" id="openSettingsLink" href="/settings">模型设置</a>
        </div>
      </div>
      <div class="workspace-row">
        <div class="workspace-actions">
          <div class="workspace-badge">
            <span class="workspace-badge-label">当前工作区</span>
            <span class="workspace-badge-value" id="workspaceBadgeValue"></span>
          </div>
          <button class="btn-secondary" id="toggleWorkspaceBtn">更换工作区</button>
        </div>
        <button class="btn-primary" data-action="refresh-overview">刷新工作区</button>
      </div>
      <input id="workspaceRoot" type="hidden" />
      <div class="metrics-strip" id="metricsStrip"></div>
    </header>

    <main class="main-panel panel">
      <div id="contentRoot"></div>
    </main>
  </div>

  <div class="modal-backdrop" id="createTaskModal">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <h2 class="modal-title">新建任务</h2>
          <p class="modal-subtitle">像和 ChatGPT 对话一样描述你要做的内容主题。你可以直接给任务说明、粘贴原始材料，也可以允许它后续联网搜集资料。</p>
        </div>
        <button class="btn-secondary" id="closeCreateTaskBtn">关闭</button>
      </div>
      <div class="modal-grid">
        <div class="field">
          <label>主题名称</label>
          <input id="createTaskTopic" placeholder="例如：医生如何理解 AI 工作流" />
        </div>
        <div class="field">
          <label>任务说明</label>
          <textarea class="instruction-textarea" id="createTaskBrief" placeholder="例如：做一个关于 AI 工作流如何帮助医生做小红书图文的 4 篇系列，语气专业但不僵硬。"></textarea>
        </div>
        <div class="field">
          <label>原始材料（可粘贴）</label>
          <textarea class="instruction-textarea" id="createTaskMaterials" placeholder="把已有材料、笔记、参考摘要直接粘贴进来。"></textarea>
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="createTaskWebResearch" />
          允许后续联网搜集资料
        </label>
      </div>
      <div class="card-actions">
        <button class="btn-primary" id="submitCreateTaskBtn">创建任务</button>
      </div>
    </div>
  </div>
  <input type="file" id="inputFileUpload" hidden />
  <script src="/app.js"></script>
</body>
</html>
