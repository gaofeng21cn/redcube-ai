<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RedCube AI Workbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ui-font: "Manrope", "Avenir Next", "SF Pro Text", "PingFang SC", "Noto Sans SC", sans-serif;
      --display-font: "Space Grotesk", "Avenir Next Condensed", "SF Pro Display", "PingFang SC", sans-serif;
      --primary: #00646b;
      --primary-container: #107f87;
      --primary-fixed-dim: #7ad4dd;
      --secondary: #4c6267;
      --surface: #f6fafb;
      --surface-container-low: #f0f4f5;
      --surface-container: #eaeef0;
      --surface-container-high: #e5e9ea;
      --surface-container-highest: #dfe3e4;
      --surface-container-lowest: #ffffff;
      --tertiary-fixed: #ffdbcb;
      --bg: var(--surface);
      --bg-deep: #e8eef0;
      --panel: rgba(255, 255, 255, 0.70);
      --panel-strong: rgba(255, 255, 255, 0.84);
      --panel-wash: rgba(255, 255, 255, 0.48);
      --line: rgba(189, 201, 200, 0.34);
      --line-strong: rgba(110, 121, 121, 0.20);
      --outline-variant: rgba(189, 201, 200, 0.72);
      --ink: #181c1d;
      --muted: #3e4949;
      --sage: #7ad4dd;
      --sage-strong: #00646b;
      --sage-soft: rgba(0, 100, 107, 0.10);
      --brand: #107f87;
      --brand-soft: rgba(16, 127, 135, 0.12);
      --accent: var(--primary);
      --accent-soft: rgba(0, 100, 107, 0.12);
      --running: #00646b;
      --running-soft: rgba(0, 100, 107, 0.12);
      --blocked: #ba1a1a;
      --pending: #4c6267;
      --done: #0f766e;
      --shadow: 0 20px 40px rgba(8, 31, 35, 0.06);
      --shadow-strong: 0 24px 48px rgba(8, 31, 35, 0.08);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, rgba(122, 212, 221, 0.14), transparent 26%),
        radial-gradient(circle at 100% 0%, rgba(255, 219, 203, 0.16), transparent 24%),
        linear-gradient(180deg, #fbfefe 0%, var(--bg) 52%, var(--bg-deep) 100%);
      font-family: var(--ui-font);
      letter-spacing: 0.01em;
    }

    button,
    a,
    input,
    select {
      font: inherit;
    }

    button,
    a.button-link {
      border: none;
      text-decoration: none;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    button:hover,
    a.button-link:hover {
      transform: translateY(-1px);
    }

    button:focus-visible,
    a.button-link:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 1px rgba(118, 139, 117, 0.34),
        0 0 0 4px rgba(118, 139, 117, 0.16);
    }

    .shell {
      max-width: 1560px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      isolation: isolate;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      z-index: -1;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(10px);
      opacity: 0.92;
    }

    .shell::before {
      width: 320px;
      height: 320px;
      top: -60px;
      left: -120px;
      background: radial-gradient(circle, rgba(118, 139, 117, 0.18), transparent 70%);
    }

    .shell::after {
      width: 340px;
      height: 340px;
      top: 28px;
      right: -120px;
      background: radial-gradient(circle, rgba(181, 120, 87, 0.16), transparent 72%);
    }

    .panel {
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.90), rgba(248, 243, 235, 0.88));
      border: 1px solid rgba(78, 65, 50, 0.10);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-strong);
      backdrop-filter: blur(18px) saturate(108%);
    }

    .app-header {
      position: relative;
      overflow: hidden;
      padding: 24px 24px 20px;
      margin-bottom: 18px;
      background:
        linear-gradient(135deg, rgba(255,251,246,0.98), rgba(248,242,233,0.96)),
        radial-gradient(circle at top right, rgba(181, 120, 87, 0.14), transparent 26%),
        radial-gradient(circle at bottom left, rgba(118, 139, 117, 0.14), transparent 24%);
    }

    .app-header::before,
    .app-header::after {
      content: "";
      position: absolute;
      inset: auto;
      pointer-events: none;
    }

    .app-header::before {
      top: 0;
      right: 0;
      width: 46%;
      height: 100%;
      background:
        linear-gradient(120deg, transparent, rgba(255,255,255,0.46)),
        linear-gradient(180deg, rgba(118, 139, 117, 0.03), rgba(181, 120, 87, 0.00));
      opacity: 0.9;
    }

    .app-header::after {
      left: 24px;
      right: 24px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(118, 139, 117, 0.00), rgba(118, 139, 117, 0.30), rgba(181, 120, 87, 0.26), rgba(181, 120, 87, 0.00));
    }

    .app-topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) auto auto;
      gap: 18px;
      align-items: center;
    }

    .brand-kicker {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .brand-title {
      margin-top: 6px;
      font-family: var(--display-font);
      font-size: clamp(30px, 3.6vw, 40px);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .brand-note {
      margin-top: 10px;
      max-width: 58ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.82;
    }

    .tabs-nav {
      display: inline-flex;
      justify-self: center;
      gap: 6px;
      padding: 8px;
      border: 1px solid rgba(78, 65, 50, 0.10);
      border-radius: 999px;
      background: rgba(255, 250, 244, 0.78);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        0 12px 24px rgba(63, 50, 36, 0.06);
      backdrop-filter: blur(18px);
    }

    .tab-button {
      padding: 11px 17px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
      min-height: 44px;
      letter-spacing: 0.01em;
    }

    .tab-button.active {
      background: linear-gradient(135deg, #233228, #5f745f 78%);
      color: #f9f7f1;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.12),
        0 10px 22px rgba(63, 50, 36, 0.14);
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .button-link,
    .btn-secondary,
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 11px 18px;
      max-width: 100%;
      white-space: nowrap;
      min-height: 44px;
      font-weight: 650;
    }

    .button-link,
    .btn-secondary {
      background: rgba(255, 250, 244, 0.84);
      color: var(--ink);
      border: 1px solid rgba(78, 65, 50, 0.10);
      box-shadow: 0 10px 22px rgba(63, 50, 36, 0.04);
    }

    .btn-primary {
      background: linear-gradient(135deg, #243128, #4f6554 58%, #6f8570);
      color: #faf7f0;
      box-shadow: 0 16px 32px rgba(63, 50, 36, 0.16);
    }

    .btn-danger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 11px 16px;
      max-width: 100%;
      white-space: nowrap;
      background: rgba(177, 94, 69, 0.10);
      color: #93472f;
      border: 1px solid rgba(177, 94, 69, 0.16);
    }

    .workspace-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
    }

    .workspace-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .workspace-badge {
      display: inline-grid;
      align-items: start;
      gap: 10px;
      padding: 12px 15px;
      border-radius: 20px;
      background: rgba(255, 250, 244, 0.88);
      border: 1px solid rgba(78, 65, 50, 0.10);
      max-width: 100%;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.88);
    }

    .workspace-badge-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .workspace-badge-value {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 520px;
    }

    .field select,
    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.78);
      padding: 13px 14px;
      color: var(--ink);
      outline: none;
    }

    .field select:focus,
    .field input:focus {
      border-color: rgba(118, 139, 117, 0.35);
      box-shadow: 0 0 0 4px rgba(118, 139, 117, 0.08);
    }

    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .metric-pill {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 14px 16px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.92);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.88), rgba(248,250,252,0.78));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        0 10px 22px rgba(15, 23, 42, 0.04);
    }

    .metric-pill strong {
      font-size: 20px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .metric-pill span {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .main-panel {
      min-height: calc(100vh - 210px);
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255,252,247,0.72), rgba(247,241,233,0.76));
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
      animation: panelFadeIn 260ms ease both;
    }

    .surface {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,252,247,0.96), rgba(249,244,236,0.92));
      box-shadow:
        0 12px 30px rgba(63, 50, 36, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.86);
    }

    .workbench-layout {
      display: grid;
      grid-template-columns: 232px minmax(0, 1fr) 300px;
      gap: 18px;
      min-height: calc(100vh - 280px);
    }

    .workbench-layout > * {
      min-width: 0;
    }

    .rail {
      padding: 18px;
      display: grid;
      gap: 16px;
      align-content: start;
      min-width: 0;
      overflow: hidden;
    }

    .rail-section + .rail-section {
      margin-top: 2px;
    }

    .rail-project-name {
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .rail-project-switch {
      display: flex;
      margin-top: 10px;
      width: 100%;
      justify-content: center;
    }

    .section-title {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .section-copy {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .list-stack,
    .stage-stack,
    .chip-row,
    .run-list {
      display: grid;
      gap: 10px;
    }

    .list-button,
    .stage-button,
    .preview-chip,
    .project-row,
    .run-row {
      width: 100%;
      text-align: left;
      border-radius: 18px;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--line);
      color: inherit;
    }

    .list-button.active,
    .stage-button.active,
    .preview-chip.active,
    .project-row.active {
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.96), rgba(255, 255, 255, 0.84));
      border-color: rgba(37, 99, 235, 0.18);
    }

    .list-label,
    .project-name {
      font-size: 15px;
      font-weight: 650;
      line-height: 1.35;
    }

    .list-meta,
    .stage-meta,
    .project-meta,
    .run-meta,
    .field-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-pill.done {
      color: var(--done);
      background: rgba(15, 118, 110, 0.12);
    }

    .status-pill.pending {
      color: var(--pending);
      background: rgba(161, 98, 7, 0.12);
    }

    .status-pill.running {
      color: var(--running);
      background: var(--running-soft);
    }

    .status-pill.failed {
      color: var(--blocked);
      background: rgba(180, 35, 24, 0.12);
    }

    .status-pill.blocked {
      color: var(--blocked);
      background: rgba(154, 52, 18, 0.12);
    }

    .canvas {
      padding: 22px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .canvas-header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
    }

    .canvas-context-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .canvas-kicker {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .context-link {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(15, 23, 42, 0.05);
      color: var(--ink);
      font-size: 12px;
      font-weight: 600;
    }

    .canvas-title {
      margin: 10px 0 10px;
      font-family: var(--display-font);
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .canvas-subtitle {
      margin: 0;
      max-width: 68ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .inline-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 12px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }

    .stat-chip strong {
      color: var(--ink);
      font-size: 13px;
    }

    .preview-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .preview-chip {
      width: auto;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
    }

    .preview-canvas {
      min-height: 780px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.05), transparent 24%),
        rgba(255, 255, 255, 0.88);
    }

    .preview-canvas.phone-canvas {
      max-width: 700px;
      min-height: 560px;
      height: min(720px, calc(100vh - 380px));
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.05), transparent 32%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 247, 251, 0.96));
    }

    .preview-canvas.phone-canvas.image-preview {
      min-height: 420px;
      height: min(560px, calc(100vh - 500px));
    }

    .preview-empty {
      min-height: 780px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      line-height: 1.8;
      padding: 40px;
    }

    .doc-viewer {
      height: 780px;
      overflow: auto;
      padding: 24px 26px;
      white-space: pre-wrap;
      line-height: 1.74;
      font-size: 14px;
    }

    .html-viewer {
      border: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    .image-stage {
      height: 100%;
      overflow: hidden;
      padding: 12px;
      display: grid;
      place-items: center;
      background: #fff;
      min-height: 0;
    }

    .slide-frame {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #f8fafc, #edf2f7);
      display: grid;
      place-items: center;
      padding: 10px;
      min-height: 0;
    }

    .projects-home,
    .project-home-canvas {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .project-home-layout {
      grid-template-columns: 232px minmax(0, 1fr) 360px;
    }

    .director-hero-shell {
      padding: 28px;
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 18px;
      align-content: start;
      background:
        radial-gradient(circle at top right, rgba(181, 120, 87, 0.12), transparent 28%),
        radial-gradient(circle at bottom left, rgba(118, 139, 117, 0.12), transparent 26%),
        linear-gradient(135deg, rgba(255,252,247,0.98), rgba(248,242,233,0.96));
      border: 1px solid rgba(78, 65, 50, 0.10);
      box-shadow:
        0 18px 40px rgba(63, 50, 36, 0.06),
        inset 0 1px 0 rgba(255,255,255,0.86);
    }

    .director-hero-shell::before,
    .director-hero-shell::after {
      content: "";
      position: absolute;
      inset: auto;
      pointer-events: none;
      border-radius: 999px;
    }

    .director-hero-shell::before {
      width: 280px;
      height: 280px;
      top: -90px;
      right: -70px;
      background: radial-gradient(circle, rgba(181, 120, 87, 0.12), transparent 72%);
    }

    .director-hero-shell::after {
      width: 280px;
      height: 280px;
      left: -90px;
      bottom: -140px;
      background: radial-gradient(circle, rgba(118, 139, 117, 0.12), transparent 72%);
    }

    .director-hero-shell.compact {
      padding: 24px;
    }

    .project-hero-shell {
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .director-hero-grid,
    .project-hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.85fr);
      gap: 20px;
      align-items: stretch;
    }

    .director-hero-main,
    .director-side-card,
    .project-hero-body,
    .project-hero-side {
      min-width: 0;
    }

    .director-hero-title,
    .project-hero-title {
      margin: 12px 0 10px;
      font-family: var(--display-font);
      font-size: clamp(36px, 4.4vw, 58px);
      line-height: 0.94;
      letter-spacing: -0.05em;
      position: relative;
      z-index: 1;
    }

    .director-hero-title.compact {
      font-size: clamp(28px, 3.2vw, 40px);
    }

    .director-hero-copy,
    .project-hero-copy {
      margin: 0;
      max-width: 62ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.82;
      position: relative;
      z-index: 1;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .workspace-overview-panel {
      background:
        linear-gradient(180deg, rgba(255,252,247,0.98), rgba(248,242,233,0.94));
    }

    .director-side-card {
      padding: 20px;
      border-radius: 24px;
      border: 1px solid rgba(78, 65, 50, 0.10);
      background: rgba(255, 250, 244, 0.80);
      display: grid;
      gap: 16px;
      align-content: start;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.88),
        0 10px 24px rgba(63, 50, 36, 0.04);
      position: relative;
      z-index: 1;
    }

    .director-side-title {
      margin-top: 8px;
      font-family: var(--display-font);
      font-size: clamp(24px, 2.6vw, 32px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .director-brief-list {
      display: grid;
      gap: 10px;
    }

    .director-brief-item {
      display: grid;
      gap: 4px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(250, 245, 238, 0.92);

      font-size: clamp(24px, 2.8vw, 32px);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .topbar-search {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      max-width: 340px;
      padding: 0 14px;
      min-height: 46px;
      border-radius: 999px;
      border: 1px solid rgba(189, 201, 200, 0.24);
      background: rgba(255, 255, 255, 0.48);
    }

    .topbar-search input {
      width: 100%;
      border: 0;
      background: transparent;
      outline: none;
      color: var(--ink);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .workspace-badge {
      display: inline-grid;
      align-items: start;
      gap: 6px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.52);
      border: 1px solid rgba(189, 201, 200, 0.28);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.86);
      max-width: 320px;
    }

    .workspace-badge-label {
      color: var(--secondary);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .workspace-badge-value {
      max-width: 100%;
    }

    .button-link,
    .btn-secondary,
    .btn-primary {
      min-height: 46px;
      border-radius: 16px;
      padding: 0 18px;
    }

    .button-link,
    .btn-secondary {
      background: rgba(255, 255, 255, 0.48);
      color: var(--ink);
      border: 1px solid rgba(189, 201, 200, 0.24);
      box-shadow: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      color: #ffffff;
      box-shadow: 0 18px 32px rgba(0, 100, 107, 0.18);
    }

    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
      margin-top: 0;
    }

    .console-metric-card {
      padding: 20px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .console-metric-card span {
      display: block;
      color: var(--secondary);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .console-metric-card strong {
      display: block;
      margin-top: 16px;
      font-family: var(--display-font);
      font-size: clamp(24px, 2vw, 32px);
      line-height: 1;
      letter-spacing: -0.04em;
      overflow-wrap: anywhere;
    }

    .console-page,
    .console-stack {
      display: grid;
      gap: 18px;
    }

    .console-hero-shell {
      position: relative;
      overflow: hidden;
      padding: 28px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      box-shadow: var(--shadow-strong);
    }

    .console-hero-shell::before {
      content: "";
      position: absolute;
      inset: auto -90px -120px auto;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(122, 212, 221, 0.28), transparent 70%);
      pointer-events: none;
    }

    .console-hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .console-hero-main,
    .console-side-card,
    .insight-pane {
      position: relative;
      min-width: 0;
    }

    .console-side-card {
      padding: 22px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.56);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.58);
      display: grid;
      gap: 16px;
    }

    .console-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 219, 203, 0.90);
      color: #733512;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .console-hero-title {
      margin: 18px 0 10px;
      font-family: var(--display-font);
      font-size: clamp(34px, 4.3vw, 54px);
      line-height: 0.94;
      letter-spacing: -0.06em;
      max-width: 12ch;
    }

    .console-hero-copy {
      margin: 0;
      max-width: 62ch;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.82;
    }

    .console-action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .console-task-list {
      display: grid;
      gap: 12px;
    }

    .console-task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.50);
      border: 1px solid rgba(189, 201, 200, 0.16);
    }

    .console-task-item span {
      color: var(--secondary);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .console-task-item strong {
      font-size: 14px;
      line-height: 1.4;
      text-align: right;
    }

    .console-status-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .console-status-grid .console-metric-card strong {
      margin-top: 12px;
      font-size: 28px;
    }

    .console-status-grid .console-metric-card p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .console-table-shell {
      padding: 24px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .console-production-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 380px);
      gap: 18px;
      align-items: start;
    }

    .console-section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .console-section-head h3 {
      margin: 0;
      font-family: var(--display-font);
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .console-section-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .console-table {
      width: 100%;
      border-collapse: collapse;
    }

    .console-table thead th {
      padding: 14px 12px;
      font-size: 11px;
      color: var(--secondary);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      border-bottom: 1px solid rgba(189, 201, 200, 0.24);
    }

    .console-table tbody td {
      padding: 18px 12px;
      border-bottom: 1px solid rgba(189, 201, 200, 0.18);
      vertical-align: middle;
    }

    .console-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .console-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.30);
    }

    .console-prod-id {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .console-prod-title {
      font-family: var(--display-font);
      font-size: 22px;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .console-prod-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .console-prod-efficiency {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .table-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-size: 13px;
      white-space: nowrap;
    }

    .table-status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(76, 98, 103, 0.38);
      box-shadow: 0 0 0 5px rgba(76, 98, 103, 0.10);
    }

    .table-status.running::before {
      background: var(--primary);
      box-shadow: 0 0 0 5px rgba(0, 100, 107, 0.12);
    }

    .table-status.done::before {
      background: var(--done);
      box-shadow: 0 0 0 5px rgba(15, 118, 110, 0.12);
    }

    .table-status.failed::before {
      background: var(--blocked);
      box-shadow: 0 0 0 5px rgba(186, 26, 26, 0.12);
    }

    .table-action-cell {
      text-align: right;
      white-space: nowrap;
    }

    .table-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(189, 201, 200, 0.26);
      background: rgba(255, 255, 255, 0.52);
      color: var(--ink);
      text-decoration: none;
      cursor: pointer;
    }

    .table-action[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .insight-pane {
      padding: 22px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.56);
      background: linear-gradient(180deg, rgba(255, 219, 203, 0.78), rgba(255, 255, 255, 0.70));
      box-shadow: 0 20px 40px rgba(8, 31, 35, 0.06);
      display: grid;
      gap: 16px;
      align-content: start;
      max-width: 380px;
      margin-left: auto;
    }

    .insight-pane strong {
      font-family: var(--display-font);
      font-size: 26px;
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .insight-pane p,
    .insight-point {
      margin: 0;
      color: rgba(24, 28, 29, 0.84);
      font-size: 14px;
      line-height: 1.7;
    }

    .insight-point {
      padding-left: 14px;
      position: relative;
    }

    .insight-point::before {
      content: "";
      position: absolute;
      left: 0;
      top: 9px;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--primary);
    }

    @media (max-width: 1320px) {
      .metrics-strip,
      .console-status-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 1040px) {
      .shell-sidebar {
        position: static;
        width: auto;
        inset: auto;
        border-right: 0;
      }

      .shell-content {
        margin-left: 0;
      }

      .shell-topbar,
      .console-hero-grid,
      .console-production-layout,
      .console-status-grid,
      .metrics-strip {
        grid-template-columns: 1fr;
      }

      .shell-topbar {
        position: static;
        display: grid;
        align-items: start;
      }

      .topbar-search {
        max-width: none;
      }
    }

    @media (max-width: 760px) {
      .shell-main {
        padding: 18px 16px 32px;
      }

      .shell-topbar {
        padding: 16px;
      }

      .console-hero-shell,
      .console-table-shell,
      .insight-pane {
        padding: 18px;
      }

      .topbar-actions,
      .console-action-row {
        width: 100%;
      }

      .topbar-actions > *,
      .console-action-row > * {
        flex: 1 1 100%;
      }

      .console-table {
        min-width: 720px;
      }
    }

    @media (max-width: 1200px) {
      .projects-layout,
      .runs-layout,
      .models-layout,
      .project-home-grid,
      .director-hero-grid,
      .project-hero-grid,
      .director-action-grid,
      .director-summary-grid,
      .director-status-strip,
      .overview-card-grid,
      .project-directory-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 1040px) {
      .app-topbar,
      .workspace-row,
      .workbench-layout,
      .project-home-layout {
        grid-template-columns: 1fr;
      }

      .tabs-nav {
        justify-self: start;
      }
    }

    @media (max-width: 760px) {
      .shell {
        padding: 16px;
      }

      .director-hero-shell {
        padding: 20px;
      }

      .preview-canvas,
      .preview-empty,
      .doc-viewer,
      .html-viewer,
      .image-stage {
        min-height: 520px;
        height: 520px;
      }

      .preview-canvas.phone-canvas {
        min-height: 560px;
        height: 560px;
      }

      .matrix-row {
        grid-template-columns: 1fr;
      }

      .director-status-strip,
      .director-action-grid,
      .director-summary-grid {
        grid-template-columns: 1fr;
      }

      .workflow-detail-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell-app">
    <aside class="shell-sidebar glass-panel">
      <div class="sidebar-brand">
        <div class="sidebar-mark">
          <span class="material-symbols-outlined">psychology</span>
        </div>
        <div>
          <div class="sidebar-overline">RedCube AI</div>
          <div class="sidebar-title">AI_WORKBENCH</div>
          <div class="sidebar-subtitle">Crystalline Logic</div>
        </div>
      </div>
      <nav class="tabs-nav" id="tabsNav"></nav>
      <div class="sidebar-footer">
        <button class="btn-primary" data-action="open-create-task">创建任务</button>
        <a class="sidebar-meta-link" href="/settings">模型设置</a>
      </div>
    </aside>

    <div class="shell-content">
      <header class="shell-topbar glass-panel">
        <div class="topbar-heading">
          <div class="topbar-kicker">RedCube AI</div>
          <h1>DIRECTOR_CONSOLE</h1>
        </div>
        <label class="topbar-search">
          <span class="material-symbols-outlined">search</span>
          <input type="text" placeholder="搜索主线内容..." aria-label="搜索主线内容" />
        </label>
        <div class="topbar-actions">
          <div class="workspace-badge">
            <span class="workspace-badge-label">当前工作区</span>
            <span class="workspace-badge-value" id="workspaceBadgeValue"></span>
          </div>
          <button class="btn-secondary" id="toggleWorkspaceBtn">更换工作区</button>
          <a class="button-link btn-secondary" id="openSettingsLink" href="/settings">模型设置</a>
          <button class="btn-primary" id="openCreateTaskBtn">创建任务</button>
        </div>
      </header>

      <main class="shell-main">
        <input id="workspaceRoot" type="hidden" />
        <div class="metrics-strip" id="metricsStrip"></div>
        <div id="contentRoot"></div>
      </main>
    </div>
  </div>

  <div class="modal-backdrop" id="createTaskModal">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <h2 class="modal-title">新建任务</h2>
          <p class="modal-subtitle">像和 ChatGPT 对话一样描述你要做的内容主题。你可以直接给任务说明、粘贴原始材料，也可以允许它后续联网搜集资料。</p>
        </div>
        <button class="btn-secondary" id="closeCreateTaskBtn">关闭</button>
      </div>
      <div class="modal-grid">
        <div class="field">
          <label>主题名称</label>
          <input id="createTaskTopic" placeholder="例如：医生如何理解 AI 工作流" />
        </div>
        <div class="field">
          <label>任务说明</label>
          <textarea class="instruction-textarea" id="createTaskBrief" placeholder="例如：做一个关于 AI 工作流如何帮助医生做小红书图文的 4 篇系列，语气专业但不僵硬。"></textarea>
        </div>
        <div class="field">
          <label>原始材料（可粘贴）</label>
          <textarea class="instruction-textarea" id="createTaskMaterials" placeholder="把已有材料、笔记、参考摘要直接粘贴进来。"></textarea>
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="createTaskWebResearch" />
          允许后续联网搜集资料
        </label>
      </div>
      <div class="card-actions">
        <button class="btn-primary" id="submitCreateTaskBtn">创建任务</button>
      </div>
    </div>
  </div>
  <input type="file" id="inputFileUpload" hidden />
  <script src="/app.js"></script>
</body>
</html>
